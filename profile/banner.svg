<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00FFCC;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFCC;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#00FFCC;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)" rx="0"/>

  <!-- Animated wave bottom -->
  <path fill="url(#waveGrad)" fill-opacity="0.3">
    <animate attributeName="d" dur="6s" repeatCount="indefinite"
      values="
        M0,140 C150,100 300,160 450,130 C600,100 750,150 900,120 L900,200 L0,200 Z;
        M0,120 C150,150 300,110 450,140 C600,160 750,110 900,140 L900,200 L0,200 Z;
        M0,140 C150,100 300,160 450,130 C600,100 750,150 900,120 L900,200 L0,200 Z
      "/>
  </path>
  <path fill="#00FFCC" fill-opacity="0.15">
    <animate attributeName="d" dur="8s" repeatCount="indefinite"
      values="
        M0,160 C200,130 400,170 600,145 C750,125 850,155 900,145 L900,200 L0,200 Z;
        M0,145 C200,165 400,135 600,160 C750,175 850,140 900,155 L900,200 L0,200 Z;
        M0,160 C200,130 400,170 600,145 C750,125 850,155 900,145 L900,200 L0,200 Z
      "/>
  </path>

  <!-- Glowing accent line top -->
  <line x1="0" y1="3" x2="900" y2="3" stroke="#00FFCC" stroke-width="2" opacity="0.6" filter="url(#glow)"/>

  <!-- Grid dots pattern -->
  <g opacity="0.08" fill="#00FFCC">
    <circle cx="50" cy="40" r="1.5"/><circle cx="100" cy="40" r="1.5"/><circle cx="150" cy="40" r="1.5"/>
    <circle cx="800" cy="40" r="1.5"/><circle cx="850" cy="40" r="1.5"/><circle cx="50" cy="80" r="1.5"/>
    <circle cx="800" cy="80" r="1.5"/><circle cx="850" cy="80" r="1.5"/>
  </g>

  <!-- Main title with fade-in -->
  <text x="450" y="88" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="54" font-weight="800" fill="#ffffff" filter="url(#glow)" opacity="0">
    AIX GROUP
    <animate attributeName="opacity" from="0" to="1" dur="1.2s" begin="0.2s" fill="freeze"/>
  </text>

  <!-- Tagline -->
  <text x="450" y="120" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="16" font-weight="400" fill="#00FFCC" opacity="0">
    Enterprise AI Solutions &amp; Consulting
    <animate attributeName="opacity" from="0" to="1" dur="1.2s" begin="0.7s" fill="freeze"/>
  </text>

  <!-- Subtitle -->
  <text x="450" y="148" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="12" font-weight="300" fill="#888888" opacity="0">
    Transforming enterprises with production-grade AI  ·  20+ years of engineering excellence
    <animate attributeName="opacity" from="0" to="1" dur="1.2s" begin="1.1s" fill="freeze"/>
  </text>
</svg>
